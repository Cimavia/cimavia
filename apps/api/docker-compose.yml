services:
  postgres:
    image: postgres:18-alpine
    container_name: cimavia_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: cimavia
      POSTGRES_PASSWORD: cimavia
      POSTGRES_DB: cimavia
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cimavia -d cimavia"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Object storage S3-compatible pour le dev local (remplace Scaleway sans compte ni CB).
  # Portabilité : seules les variables S3_* changent pour basculer sur Scaleway/Cellar.
  minio:
    image: minio/minio:latest
    container_name: cimavia_minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: cimavia
      MINIO_ROOT_PASSWORD: cimavia_dev_secret
    ports:
      - "9000:9000" # API S3 (endpoint)
      - "9001:9001" # Console web (http://localhost:9001)
    volumes:
      - minio_data:/data

  # Crée le bucket privé au démarrage puis s'arrête (idempotent).
  minio-setup:
    image: minio/mc:latest
    container_name: cimavia_minio_setup
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      until mc alias set local http://minio:9000 cimavia cimavia_dev_secret; do echo 'attente MinIO…'; sleep 1; done &&
      mc mb --ignore-existing local/cimavia-media-dev &&
      mc anonymous set none local/cimavia-media-dev &&
      mc mb --ignore-existing local/cimavia-media-e2e &&
      mc anonymous set none local/cimavia-media-e2e &&
      echo 'buckets cimavia-media-dev et cimavia-media-e2e prêts (privés)'
      "

volumes:
  postgres_data:
  minio_data:
