services:
  postgres-e2e:
    image: postgres:18-alpine
    container_name: cimavia_postgres_e2e
    restart: unless-stopped
    environment:
      POSTGRES_USER: cimavia_e2e
      POSTGRES_PASSWORD: cimavia_dev_e2e
      POSTGRES_DB: cimavia_db_e2e
    ports:
      - "5434:5432"
    volumes:
      - postgres_e2e_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cimavia_e2e -d cimavia_db_e2e"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_e2e_data:
